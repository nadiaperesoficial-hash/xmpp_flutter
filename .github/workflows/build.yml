name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xmpp_dart
        uses: actions/checkout@v4
        with:
          repository: vukoye/xmpp_dart
          path: xmpp_dart

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'   # pode manter ou subir para 3.22.x
          channel: stable

      # -------------------------------------------------------------
      #  PASSO CRÍTICO: corrige a versão do whixp para evitar conflito com path
      # -------------------------------------------------------------
      - name: Fix whixp version dependency
        working-directory: app
        run: |
          # Remove qualquer referência antiga ao whixp no pubspec.yaml
          # e adiciona a versão compatível (2.1.3)
          flutter pub add whixp:^2.1.3

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        working-directory: app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-chat-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
