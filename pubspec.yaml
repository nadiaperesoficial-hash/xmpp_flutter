version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  whixp: ^3.3.1
  rxdart: ^0.27.7
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path: ^1.8.0
  quiver: ^3.2.1
